# ─────────────────────────────────────────────────────────────
# Podcast configuration
#
# For each podcast:
#
#   url:
#     YouTube playlist URL  →  https://www.youtube.com/playlist?list=PL...
#     OR channel URL        →  https://www.youtube.com/@ChannelName
#     Playlists are preferred.
#
#   default_format:
#     "audio"  — MP3 (smaller, faster, recommended for podcasts)
#     "video"  — original video
#     Override per-request with Telegram commands:
#       /archive          → uses this default
#       /archive audio    → force audio
#       /archive video    → force video
#
#   active:
#     true   — include in scans and digests
#     false  — skip (preserved for easy re-enabling)
#
# ─────────────────────────────────────────────────────────────

