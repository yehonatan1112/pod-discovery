# ─────────────────────────────────────────────────────────────
# Digest schedule
# ─────────────────────────────────────────────────────────────

digest:
  # Days to send the daily digest (Israel time)
  # 0=Sunday 1=Monday 2=Tuesday 3=Wednesday 4=Thursday 5=Friday 6=Saturday
  daily_days: [0, 1, 2, 3]    # Sun, Mon, Tue, Wed

  # Saturday digest covers Thu + Fri + Sat
  saturday_day: 6

  # Time to send, Israel time (UTC+3), 24h
  send_time: "20:00"


# ─────────────────────────────────────────────────────────────
# Archive settings
# ─────────────────────────────────────────────────────────────

archives:
  # How long the download link stays valid
  link_expiry_hours: 48

  # Audio quality: 0=best, 9=worst (3 is a good balance)
  audio_quality: 3

  # Audio format
  audio_format: mp3
