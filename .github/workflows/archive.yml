name: Create Archive

on:
  workflow_dispatch:
    inputs:
      fmt_override:
        description: "Force format: 'audio', 'video', or '' for per-podcast defaults"
        default: ""
      window_start:
        description: "Window start (ISO datetime, Israel time)"
        required: true
      window_end:
        description: "Window end (ISO datetime, Israel time)"
        required: true

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # archives can take a while

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Create and upload archive
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          INPUT_FMT_OVERRIDE: ${{ inputs.fmt_override }}
          INPUT_WINDOW_START: ${{ inputs.window_start }}
          INPUT_WINDOW_END: ${{ inputs.window_end }}
        run: python scripts/archive.py
