name: Create Archive

on:
  workflow_dispatch:
    inputs:
      fmt_override:
        description: "Force format: 'audio', 'video', or '' for per-podcast defaults"
        default: ""
      window_start:
        description: "Window start (ISO datetime, Israel time)"
        required: true
      window_end:
        description: "Window end (ISO datetime, Israel time)"
        required: true

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Write YouTube cookies
        if: ${{ secrets.YOUTUBE_COOKIES != '' }}
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: echo "$YOUTUBE_COOKIES" > /tmp/yt-cookies.txt

      - name: Create and upload archive
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INPUT_FMT_OVERRIDE: ${{ inputs.fmt_override }}
          INPUT_WINDOW_START: ${{ inputs.window_start }}
          INPUT_WINDOW_END: ${{ inputs.window_end }}
        run: python scripts/archive.py
